<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel of Terror</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Fortune" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Google Fonts: Nunito + Fredoka -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Hamburger toggle (mobile) -->
<button class="hamburger" id="hamburger" aria-label="Toggle candidates panel" aria-expanded="false">
  <span></span>
  <span></span>
  <span></span>
</button>

<header>
  <h1>Wheel of <span id="wheel-word">Terror</span></h1>
  <p>Add names and spin the wheel!</p>
</header>

<div class="main">

  <!-- Wheel -->
  <div class="wheel-section">
    <div class="wheel-wrapper">
      <canvas id="wheel" width="440" height="440"></canvas>
      <div class="spin-hint"  id="spinHint">Click to spin</div>
      <div class="empty-hint" id="emptyHint">Add names to get started</div>
    </div>
  </div>

  <!-- Names panel -->
  <div class="names-panel">
    <h2>Candidates</h2>

    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter name..." maxlength="25" autocomplete="off">
      <button class="btn-add">+ Add</button>
    </div>

    <button class="bulk-toggle" id="bulkToggle">Paste total list</button>

    <div class="bulk-area" id="bulkArea">
      <textarea id="bulkInput" placeholder="Paste your names here, one per line:&#10;&#10;Paul&#10;Frank&#10;Guido&#10;Anke"></textarea>
      <div class="bulk-row">
        <button class="btn-bulk-add">+ Add all</button>
        <button class="btn-bulk-clear">Clear</button>
      </div>
    </div>

    <ul class="names-list" id="namesList"></ul>
    <p class="status-msg" id="statusMsg"
       data-msg-empty="Add at least 2 names."
       data-msg-one="1 candidate — add at least 1 more."
       data-msg-many="candidates"></p>

    <!-- Past candidates -->
    <div class="past-section" id="pastSection">
      <div class="past-header">
        <span class="past-title">Past candidates</span>
        <button class="btn-clear-past">Clear</button>
      </div>
      <ol class="past-list" id="pastList"></ol>
    </div>
  </div>

</div>

<!-- Confetti canvas -->
<canvas id="confetti-canvas"></canvas>

<!-- Winner modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <p class="modal-label">The winner is</p>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-buttons">
      <button class="btn-close">Spin again</button>
      <button class="btn-remove">Keep &amp; spin again</button>
    </div>
  </div>
</div>

<!-- List item templates (used by app.js — no logic here, just structure) -->
<template id="tmpl-name-item">
  <li>
    <div class="name-inner">
      <span class="name-label"></span>
    </div>
    <button class="btn-del" aria-label="Remove">✕</button>
  </li>
</template>

<template id="tmpl-past-item">
  <li>
    <span class="past-name"></span>
  </li>
</template>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- JavaScript -->
<script src="js/app.js"></script>

<!-- Hamburger / panel toggle -->
<script>
  (function () {
    const btn      = document.getElementById('hamburger');
    const panel    = document.querySelector('.names-panel');
    const bars     = btn.querySelectorAll('span');

    let isOpen  = false;
    let panelTl = null; // reassigned per breakpoint by gsap.matchMedia

    // ── Hamburger bars → × (identical on every screen size) ──────────────
    // bar height 3 px + gap 6 px → centres are 9 px apart
    const barTl = gsap.timeline({ paused: true })
      .to(bars[0], { y:  9, rotation:  45, duration: 0.3, ease: 'power2.inOut' }, 0)
      .to(bars[1], { scaleX: 0, opacity: 0, duration: 0.2, ease: 'power2.inOut' }, 0)
      .to(bars[2], { y: -9, rotation: -45, duration: 0.3, ease: 'power2.inOut' }, 0);

    // ── Open / close helpers ──────────────────────────────────────────────
    function openPanel()  {
      isOpen = true;
      btn.setAttribute('aria-expanded', true);
      panelTl?.play();
      barTl.play();
    }
    function closePanel() {
      isOpen = false;
      btn.setAttribute('aria-expanded', false);
      panelTl?.reverse();
      barTl.reverse();
    }

    btn.addEventListener('click',     () => isOpen ? closePanel() : openPanel());

    // ── Shared cleanup — returned from every matchMedia context ───────────
    // GSAP calls this automatically when a media query stops matching,
    // so state is always clean before the next context initialises.
    function cleanup() {
      panelTl?.kill();
      panelTl = null;
      if (isOpen) {
        barTl.progress(0).pause();
        btn.setAttribute('aria-expanded', false);
        isOpen = false;
      }
    }

    // ── Responsive animation contexts ────────────────────────────────────
    const mm = gsap.matchMedia();

    // Desktop (≥ 769 px): narrow panel slides in from the right
    // CSS translate: 0 -50% keeps the panel vertically centred independently
    // of GSAP's transform, so xPercent alone drives the slide.
    mm.add('(min-width: 769px)', () => {
      gsap.set(panel,    { xPercent: 110 });

      panelTl = gsap.timeline({ paused: true })
        .to(panel,    { xPercent: 0, duration: 0.55, ease: 'back.out(1.4)' }, 0);

      return cleanup;
    });

    // Mobile (≤ 768 px): full-screen panel rises from below the viewport
    mm.add('(max-width: 768px)', () => {
      gsap.set(panel,    { yPercent: 100 });

      panelTl = gsap.timeline({ paused: true })
        .to(panel,    { yPercent: 0, duration: 0.4, ease: 'power2.out' }, 0);

      return cleanup;
    });
  })();
</script>

<!-- Word transition animation -->
<script>
  (function () {
    const words  = ['Terror', 'Doom', 'Fortune', 'Names', 'Destiny', 'Fate', 'Chaos', 'Misfortune', 'Regret', 'Madness', 'Anxiety', 'Confusion', 'Mystery', 'Wonders', 'Volunteers', 'Courage', 'Ideas'];
    let  current = 0;
    const wordEl = document.getElementById('wheel-word');

    // perspective is set via CSS on <header> so clearProps won't break 3D flips

    // ── EXIT animations (visible → invisible, fires onComplete callback) ──
    const exits = [
      (done) => gsap.to(wordEl, { rotationX:  90, opacity: 0, duration: 0.4,  ease: 'power2.in', transformOrigin: '50% 100%', onComplete: done }),
      (done) => gsap.to(wordEl, { rotationY:  90, opacity: 0, duration: 0.4,  ease: 'power2.in', transformOrigin: '100% 50%', onComplete: done }),
      (done) => gsap.to(wordEl, { scale:       0, opacity: 0, duration: 0.35, ease: 'back.in(2)', onComplete: done }),
      (done) => gsap.to(wordEl, { y:         -44, opacity: 0, duration: 0.38, ease: 'power2.in', onComplete: done }),
      (done) => gsap.to(wordEl, { x:         -60, opacity: 0, duration: 0.38, ease: 'power2.in', onComplete: done }),
      (done) => gsap.timeline({ onComplete: done })
                  .to(wordEl, { x: 10, duration: 0.05, ease: 'none', repeat: 5, yoyo: true })
                  .to(wordEl, { x: 0,  opacity: 0, duration: 0.22 }),
      (done) => gsap.to(wordEl, { rotation: 180, scale: 0.3, opacity: 0, duration: 0.4, ease: 'power2.in', onComplete: done }),
      (done) => gsap.to(wordEl, { skewX:  30, x:  40, opacity: 0, duration: 0.38, ease: 'power2.in', onComplete: done }),
    ];

    // ── ENTRY animations (invisible → visible) ──
    const entries = [
      () => gsap.fromTo(wordEl, { rotationX: -90, opacity: 0, transformOrigin: '50% 0%'  }, { rotationX: 0,   opacity: 1, duration: 0.45, ease: 'back.out(1.5)' }),
      () => gsap.fromTo(wordEl, { rotationY: -90, opacity: 0, transformOrigin: '0% 50%'  }, { rotationY: 0,   opacity: 1, duration: 0.45, ease: 'back.out(1.5)' }),
      () => gsap.fromTo(wordEl, { scale:       0, opacity: 0 },                              { scale:     1,   opacity: 1, duration: 0.55, ease: 'elastic.out(1, 0.5)' }),
      () => gsap.fromTo(wordEl, { y:          44, opacity: 0 },                              { y:         0,   opacity: 1, duration: 0.45, ease: 'back.out(1.5)' }),
      () => gsap.fromTo(wordEl, { x:          60, opacity: 0 },                              { x:         0,   opacity: 1, duration: 0.45, ease: 'back.out(1.2)' }),
      () => gsap.fromTo(wordEl, { scale:     1.2, opacity: 0 },                              { scale:     1,   opacity: 1, duration: 0.45, ease: 'back.out(2)' }),
      () => gsap.fromTo(wordEl, { rotation: -180, scale: 0.3, opacity: 0 },                  { rotation:  0,   scale:  1, opacity: 1, duration: 0.5, ease: 'back.out(1.5)' }),
      () => gsap.fromTo(wordEl, { skewX:     -30, x: -40, opacity: 0 },                      { skewX:     0,   x:      0, opacity: 1, duration: 0.5, ease: 'elastic.out(1, 0.6)' }),
    ];

    function rand(arr, last) {
      let i;
      do { i = Math.floor(Math.random() * arr.length); } while (i === last);
      return i;
    }

    let lastExit  = -1;
    let lastEntry = -1;

    function nextWord() {
      current = (current + 1) % words.length;

      const exitIdx  = rand(exits,   lastExit);
      const entryIdx = rand(entries, lastEntry);
      lastExit  = exitIdx;
      lastEntry = entryIdx;

      gsap.killTweensOf(wordEl);
      exits[exitIdx](() => {
        wordEl.textContent = words[current];
        // Reset leftover transforms before entry (opacity stays 0 — cleared by entry's fromTo)
        gsap.set(wordEl, { clearProps: 'transform' });
        entries[entryIdx]();
      });
    }

    setInterval(nextWord, 5000);
  })();
</script>

</body>
</html>
