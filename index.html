<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel of Fortune</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Fortune" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Wheel of Fortune</h1>
  <p>Add participants and spin the wheel!</p>
</header>

<div class="main">

  <!-- Wheel -->
  <div class="wheel-section">
    <div class="wheel-wrapper">
      <canvas id="wheel" width="440" height="440"></canvas>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">Spin!</button>
  </div>

  <!-- Names panel -->
  <div class="names-panel">
    <h2>Participants</h2>

    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter name..." maxlength="25" autocomplete="off">
      <button class="btn-add" onclick="addName()">+ Add</button>
    </div>

    <button class="bulk-toggle" id="bulkToggle" onclick="toggleBulk()">▼ Paste total list</button>

    <div class="bulk-area" id="bulkArea">
      <textarea id="bulkInput" placeholder="Paste your names here, one per line:&#10;&#10;Paul&#10;Frank&#10;Guido&#10;Anke"></textarea>
      <div class="bulk-row">
        <button class="btn-bulk-add" onclick="addBulk()">+ Add all</button>
        <button class="btn-bulk-clear" onclick="clearBulk()">Clear</button>
      </div>
    </div>

    <ul class="names-list" id="namesList"></ul>
    <p class="status-msg" id="statusMsg"></p>

    <!-- Past participants -->
    <div class="past-section" id="pastSection">
      <div class="past-header">
        <span class="past-title">✓ Past participants</span>
        <button class="btn-clear-past" onclick="clearPast()">Clear</button>
      </div>
      <ol class="past-list" id="pastList"></ol>
    </div>
  </div>

</div>

<!-- Winner modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <p class="modal-label">The winner is</p>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-buttons">
      <button class="btn-close" onclick="closeModal()">Keep &amp; Close</button>
      <button class="btn-remove" onclick="removeWinner()">✕ Remove from wheel</button>
    </div>
  </div>
</div>

<!-- JavaScript -->
<script src="js/app.js"></script>

</body>
</html>
