<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel of Fortune</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Fortune" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Google Fonts: Nunito + Fredoka -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Wheel of Fortune</h1>
  <p>Add names and spin the wheel!</p>
</header>

<div class="main">

  <!-- Wheel -->
  <div class="wheel-section">
    <div class="wheel-wrapper">
      <canvas id="wheel" width="440" height="440"></canvas>
      <div class="spin-hint"  id="spinHint">Click to spin</div>
      <div class="empty-hint" id="emptyHint">Add names to get started</div>
    </div>
  </div>

  <!-- Names panel -->
  <div class="names-panel">
    <h2>Candidates</h2>

    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter name..." maxlength="25" autocomplete="off">
      <button class="btn-add">+ Add</button>
    </div>

    <button class="bulk-toggle" id="bulkToggle">Paste total list</button>

    <div class="bulk-area" id="bulkArea">
      <textarea id="bulkInput" placeholder="Paste your names here, one per line:&#10;&#10;Paul&#10;Frank&#10;Guido&#10;Anke"></textarea>
      <div class="bulk-row">
        <button class="btn-bulk-add">+ Add all</button>
        <button class="btn-bulk-clear">Clear</button>
      </div>
    </div>

    <ul class="names-list" id="namesList"></ul>
    <p class="status-msg" id="statusMsg"
       data-msg-empty="Add at least 2 names."
       data-msg-one="1 candidate — add at least 1 more."
       data-msg-many="candidates"></p>

    <!-- Past candidates -->
    <div class="past-section" id="pastSection">
      <div class="past-header">
        <span class="past-title">Past candidates</span>
        <button class="btn-clear-past">Clear</button>
      </div>
      <ol class="past-list" id="pastList"></ol>
    </div>
  </div>

</div>

<!-- Winner modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <p class="modal-label">The winner is</p>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-buttons">
      <button class="btn-close">Keep &amp; Close</button>
      <button class="btn-remove">✕ Remove from wheel</button>
    </div>
  </div>
</div>

<!-- List item templates (used by app.js — no logic here, just structure) -->
<template id="tmpl-name-item">
  <li>
    <div class="name-inner">
      <span class="color-dot"></span>
      <span class="name-label"></span>
    </div>
    <button class="btn-del" aria-label="Remove">✕</button>
  </li>
</template>

<template id="tmpl-past-item">
  <li>
    <span class="past-name"></span>
  </li>
</template>

<!-- JavaScript -->
<script src="js/app.js"></script>

</body>
</html>
