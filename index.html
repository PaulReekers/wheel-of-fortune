<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel of Terror</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Fortune" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Google Fonts: Nunito + Fredoka -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <h1>Wheel of <span id="wheel-word">Terror</span></h1>
  <p>Add names and spin the wheel!</p>
</header>

<div class="main">

  <!-- Wheel -->
  <div class="wheel-section">
    <div class="wheel-wrapper">
      <canvas id="wheel" width="440" height="440"></canvas>
      <div class="spin-hint"  id="spinHint">Click to spin</div>
      <div class="empty-hint" id="emptyHint">Add names to get started</div>
    </div>
  </div>

  <!-- Names panel -->
  <div class="names-panel">
    <h2>Candidates</h2>

    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Enter name..." maxlength="25" autocomplete="off">
      <button class="btn-add">+ Add</button>
    </div>

    <button class="bulk-toggle" id="bulkToggle">Paste total list</button>

    <div class="bulk-area" id="bulkArea">
      <textarea id="bulkInput" placeholder="Paste your names here, one per line:&#10;&#10;Paul&#10;Frank&#10;Guido&#10;Anke"></textarea>
      <div class="bulk-row">
        <button class="btn-bulk-add">+ Add all</button>
        <button class="btn-bulk-clear">Clear</button>
      </div>
    </div>

    <ul class="names-list" id="namesList"></ul>
    <p class="status-msg" id="statusMsg"
       data-msg-empty="Add at least 2 names."
       data-msg-one="1 candidate — add at least 1 more."
       data-msg-many="candidates"></p>

    <!-- Past candidates -->
    <div class="past-section" id="pastSection">
      <div class="past-header">
        <span class="past-title">Past candidates</span>
        <button class="btn-clear-past">Clear</button>
      </div>
      <ol class="past-list" id="pastList"></ol>
    </div>
  </div>

</div>

<!-- Winner modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <p class="modal-label">The winner is</p>
    <div class="modal-name" id="modalName"></div>
    <div class="modal-buttons">
      <button class="btn-close">Spin again</button>
      <button class="btn-remove">Keep &amp; spin again</button>
    </div>
  </div>
</div>

<!-- List item templates (used by app.js — no logic here, just structure) -->
<template id="tmpl-name-item">
  <li>
    <div class="name-inner">
      <span class="color-dot"></span>
      <span class="name-label"></span>
    </div>
    <button class="btn-del" aria-label="Remove">✕</button>
  </li>
</template>

<template id="tmpl-past-item">
  <li>
    <span class="color-dot"></span>
    <span class="past-name"></span>
  </li>
</template>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<!-- JavaScript -->
<script src="js/app.js"></script>

<!-- Word transition animation -->
<script>
  (function () {
    const words   = ['Terror', 'Doom', 'Fortune', 'Fun', 'Names', 'Destiny', 'Fate', 'Chaos', 'Misfortune', 'Regret', 'Awkward', 'Madness', 'Anxiety', 'Misfortune', 'Confusion', 'Heroes', 'Legends', 'Mystery', 'Wonders', 'Volunteers', 'Courage', 'Ideas'];
    let   current = 0;
    const wordEl  = document.getElementById('wheel-word');

    // Only the word span animates — "Wheel of" stays put
    gsap.set(wordEl, { transformPerspective: 600 });

    // Each animation: exit wordEl → swap text → enter wordEl
    const animations = [
      // Flip X — departure board
      (swap) => {
        gsap.timeline()
          .to(wordEl, { rotationX: 90, opacity: 0, duration: 0.28, ease: 'power2.in', transformOrigin: '50% 100%' })
          .call(swap)
          .fromTo(wordEl, { rotationX: -90, opacity: 0, transformOrigin: '50% 0%' },
                          { rotationX: 0,   opacity: 1, duration: 0.4, ease: 'back.out(1.5)' });
      },
      // Flip Y — side door
      (swap) => {
        gsap.timeline()
          .to(wordEl, { rotationY: 90, opacity: 0, duration: 0.28, ease: 'power2.in', transformOrigin: '100% 50%' })
          .call(swap)
          .fromTo(wordEl, { rotationY: -90, opacity: 0, transformOrigin: '0% 50%' },
                          { rotationY: 0,   opacity: 1, duration: 0.4, ease: 'back.out(1.5)' });
      },
      // Zoom collapse + elastic pop
      (swap) => {
        gsap.timeline()
          .to(wordEl, { scale: 0, opacity: 0, duration: 0.3, ease: 'back.in(2)' })
          .call(swap)
          .fromTo(wordEl, { scale: 0, opacity: 0 },
                          { scale: 1, opacity: 1, duration: 0.55, ease: 'elastic.out(1, 0.5)' });
      },
      // Slide up
      (swap) => {
        gsap.timeline()
          .to(wordEl, { y: -40, opacity: 0, duration: 0.28, ease: 'power2.in' })
          .call(swap)
          .fromTo(wordEl, { y: 40, opacity: 0 },
                          { y: 0,  opacity: 1, duration: 0.4, ease: 'back.out(1.5)' });
      },
      // Slide left
      (swap) => {
        gsap.timeline()
          .to(wordEl, { x: -60, opacity: 0, duration: 0.28, ease: 'power2.in' })
          .call(swap)
          .fromTo(wordEl, { x: 60, opacity: 0 },
                          { x: 0,  opacity: 1, duration: 0.4, ease: 'back.out(1.2)' });
      },
      // Shake + fade
      (swap) => {
        gsap.timeline()
          .to(wordEl, { x: 10, duration: 0.05, ease: 'none', repeat: 5, yoyo: true })
          .to(wordEl, { x: 0, opacity: 0, duration: 0.12 }, '<0.2')
          .call(swap)
          .fromTo(wordEl, { opacity: 0, scale: 1.2 },
                          { opacity: 1, scale: 1,  duration: 0.4, ease: 'back.out(2)' });
      },
      // Full spin
      (swap) => {
        gsap.timeline()
          .to(wordEl, { rotation: 180, opacity: 0, scale: 0.3, duration: 0.35, ease: 'power2.in' })
          .call(swap)
          .fromTo(wordEl, { rotation: -180, opacity: 0, scale: 0.3 },
                          { rotation: 0,    opacity: 1, scale: 1,   duration: 0.5, ease: 'back.out(1.5)' });
      },
      // Skew slam
      (swap) => {
        gsap.timeline()
          .to(wordEl, { skewX: 30, x: 40, opacity: 0, duration: 0.28, ease: 'power2.in' })
          .call(swap)
          .fromTo(wordEl, { skewX: -30, x: -40, opacity: 0 },
                          { skewX: 0,   x: 0,   opacity: 1, duration: 0.45, ease: 'elastic.out(1, 0.6)' });
      },
    ];

    let lastIdx = -1;

    function nextWord() {
      current = (current + 1) % words.length;

      // Pick a random animation, never repeat the same one twice in a row
      let idx;
      do { idx = Math.floor(Math.random() * animations.length); } while (idx === lastIdx);
      lastIdx = idx;

      animations[idx](() => { wordEl.textContent = words[current]; });
    }

    setInterval(nextWord, 5000);
  })();
</script>

</body>
</html>
